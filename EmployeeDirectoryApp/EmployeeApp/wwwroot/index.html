<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Employee Directory</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px;
           margin: 40px auto; padding: 20px; }
    input { padding: 8px; width: 300px; border: 1px solid #ccc;
            border-radius: 4px; }
    button { padding: 8px 16px; background: #7b1fa2; color: #fff;
             border: none; border-radius: 4px; cursor: pointer; }
    ul { list-style: disc; padding-left: 20px; margin-top: 20px; }
    li { padding: 6px 0; font-size: 16px; }
  </style>
</head>
<body>
  <h2>Employee Directory</h2>
  <input type='text' id='empName' placeholder='Enter employee name' />
  <button id='addBtn' onclick='addEmployee()'>Add Employee</button>
  <ul id='empList'></ul>

  <script>
    async function loadEmployees() {
      const res  = await fetch('/employees');
      const list = await res.json();
      const ul   = document.getElementById('empList');
      ul.innerHTML = list.map(e => `<li>${e.name}</li>`).join('');
    }

    async function addEmployee() {
      const name = document.getElementById('empName').value.trim();
      if (!name) { alert('Please enter a name'); return; }
      await fetch('/employees', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      document.getElementById('empName').value = '';
      loadEmployees();
    }

    loadEmployees();
  </script>
</body>
</html>
